version: '3.9'
services:
  backend:
    build:
      context: .
      target: dev
    container_name: nest-dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env.dev
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: postgres-dev
    environment:
      POSTGRES_DB: dev_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_pass
    ports:
      - "5432:5432"
